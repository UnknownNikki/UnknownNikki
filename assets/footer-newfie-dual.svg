<svg width="100%" height="140" viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg">

  <style>
    /* --- Dual‑mode fur colors --- */
    @media (prefers-color-scheme: light) {
      .fur { fill: #8b5a2b; }        /* warm teddy‑bear brown */
      .fur-light { fill: #a06b38; }
      .shadow { fill: rgba(0,0,0,0.18); }
    }
    @media (prefers-color-scheme: dark) {
      .fur { fill: #b07a45; }        /* lighter caramel brown for visibility */
      .fur-light { fill: #c48a55; }
      .shadow { fill: rgba(0,0,0,0.35); }
    }

    /* --- Hop animation --- */
    @keyframes hop {
      0%   { transform: translateX(-150px) translateY(0); }
      20%  { transform: translateX(150px) translateY(-18px); }
      40%  { transform: translateX(350px) translateY(0); }
      60%  { transform: translateX(550px) translateY(-18px); }
      80%  { transform: translateX(750px) translateY(0); }
      100% { transform: translateX(-150px) translateY(0); }
    }

    /* --- Shadow pulse --- */
    @keyframes shadowPulse {
      0%, 40%, 80%, 100% { opacity: 0.25; transform: scale(1); }
      20%, 60%           { opacity: 0.15; transform: scale(0.85); }
    }

    .puppy {
      animation: hop 1.2s infinite linear;
    }
    .shadow {
      animation: shadowPulse 1.2s infinite linear;
    }
  </style>

  <!-- Soft ground shadow -->
  <ellipse class="shadow" cx="100" cy="115" rx="38" ry="10"></ellipse>

  <!-- Hopping chibi Newfie group -->
  <g class="puppy">
    <!-- Body -->
    <ellipse class="fur" cx="100" cy="70" rx="38" ry="30"/>
    <!-- Head -->
    <ellipse class="fur" cx="70" cy="55" rx="28" ry="25"/>
    <!-- Snout -->
    <ellipse class="fur-light" cx="65" cy="63" rx="14" ry="10"/>
    <!-- Eyes -->
    <circle cx="55" cy="52" r="4" fill="#ffffff"/>
    <circle cx="75" cy="52" r="4" fill="#ffffff"/>
    <!-- Pupils -->
    <circle cx="55" cy="52" r="2" fill="#000000"/>
    <circle cx="75" cy="52" r="2" fill="#000000"/>
    <!-- Tongue -->
    <ellipse cx="65" cy="70" rx="6" ry="4" fill="#ff7aa2"/>
    <!-- Ears -->
    <ellipse class="fur" cx="55" cy="40" rx="10" ry="14"/>
    <ellipse class="fur" cx="85" cy="40" rx="10" ry="14"/>
    <!-- Legs -->
    <ellipse class="fur" cx="85" cy="95" rx="10" ry="12"/>
    <ellipse class="fur" cx="115" cy="95" rx="10" ry="12"/>
    <!-- Tail nub -->
    <ellipse class="fur" cx="135" cy="70" rx="10" ry="8"/>
  </g>

</svg>
