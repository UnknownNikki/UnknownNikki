name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_dots=#161b22,#8c0289,#c710b4,#ee20d9,#ff66e8
            dist/snake-light.svg?palette=github-light&color_dots=#ebedf0,#f2a7e7,#ff66e8,#ee20d9,#930891

      - name: Upload animation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snake-animations
          path: dist/

      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
