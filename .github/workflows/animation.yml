name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: UnknownNikki
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#18c9fc&color_dots=#0d1117,#cd0cfb,#b100e8,#5e17eb
            dist/snake-light.svg?palette=github-light&color_snake=#009acb&color_dots=#ffffff,#ff66e8,#d43bff,#8f3bff

      - name: Upload animation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snake-animations
          path: dist/

      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
